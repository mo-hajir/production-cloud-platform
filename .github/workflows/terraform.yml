name: Terraform CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Install specific Terraform version
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6

      # 3️⃣ Check formatting recursively
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform/environments/dev

      # 4️⃣ Initialize Terraform without touching AWS backend
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform/environments/dev

      # 5️⃣ Fetch all modules (critical for multi-module repos)
      - name: Terraform Get Modules
        run: terraform get -update
        working-directory: terraform/environments/dev

      # 6️⃣ Validate Terraform configuration
      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/environments/dev