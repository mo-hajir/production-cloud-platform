name: Terraform CI/CD

on:
  push:
    branches:
      - dev
      - staging
      - main
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/environments/${{ github.ref_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::867344436119:role/GitHubActions-Terraform-Role
          aws-region: ca-central-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Run tfsec security scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/environments/${{ github.ref_name }}
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: |
          echo "Running Terraform plan for $GITHUB_REF_NAME..."

          if [ "$GITHUB_REF_NAME" = "dev" ]; then
            TF_PUBLIC_KEY="${{ secrets.TF_PUBLIC_KEY_DEV }}"
            MY_IP="${{ secrets.MY_IP_DEV }}"
          elif [ "$GITHUB_REF_NAME" = "staging" ]; then
            TF_PUBLIC_KEY="${{ secrets.TF_PUBLIC_KEY_STAGING }}"
            MY_IP="${{ secrets.MY_IP_STAGING }}"
          else
            TF_PUBLIC_KEY="${{ secrets.TF_PUBLIC_KEY_PROD }}"
            MY_IP="${{ secrets.MY_IP_PROD }}"
          fi

          MY_IP=$(echo "$MY_IP" | tr -d '\n\r')

          terraform plan \
            -input=false \
            -var="public_key=$TF_PUBLIC_KEY" \
            -var="my_ip=$MY_IP" \
            | tee plan.txt

      - name: Comment Terraform Plan on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan
          message: |
            ## Terraform Plan
            ```
            $(cat terraform/environments/${{ github.ref_name }}/plan.txt)
            ```

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
        run: |
          echo "Applying Terraform for $GITHUB_REF_NAME..."

          if [ "$GITHUB_REF_NAME" = "dev" ]; then
            TF_PUBLIC_KEY="${{ secrets.TF_PUBLIC_KEY_DEV }}"
            MY_IP="${{ secrets.MY_IP_DEV }}"
          elif [ "$GITHUB_REF_NAME" = "staging" ]; then
            TF_PUBLIC_KEY="${{ secrets.TF_PUBLIC_KEY_STAGING }}"
            MY_IP="${{ secrets.MY_IP_STAGING }}"
          else
            TF_PUBLIC_KEY="${{ secrets.TF_PUBLIC_KEY_PROD }}"
            MY_IP="${{ secrets.MY_IP_PROD }}"
          fi

          MY_IP=$(echo "$MY_IP" | tr -d '\n\r')

          terraform apply \
            -auto-approve \
            -var="public_key=$TF_PUBLIC_KEY" \
            -var="my_ip=$MY_IP"